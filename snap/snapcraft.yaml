name: diode-node
website: https://diode.io
source-code: https://github.com/diodechain/diode_node
icon: snap/logo.png
base: core24
adopt-info: diode-node
summary: Diode relay node
description: |
  The Diode Network is a decentralized permissionless ZTNA network allowing
  any device in the network to communicate with any other device in the network
  through always end-to-end encrypted channels. Hosting a Diode relay node extends
  the network and is rewarded when the new diode relay node is used by other devices.

  WireGuard exit: after `sudo snap connect diode-node:network-control`, also run
  `sudo snap connect diode-node:firewall-control` so the service can install NAT
  (MASQUERADE) for peer internet access, or set WIREGUARD_AUTO_NAT=0 and use
  `scripts/setup-wg-nat.sh` on the host.

grade: stable # must be 'stable' to release into candidate/stable channels
confinement: strict # use 'strict' once you have the right plugs and slots

parts:
  diode-node:
    # See 'snapcraft plugins'
    plugin: make
    make-parameters: [-f snap/Makefile]
    source: .
    source-type: git
    build-packages:
      - autoconf
      - automake
      - curl
      - g++
      - git
      - libc6
      - libgmp3-dev
      - libncurses-dev
      - libstdc++6
      - libtool
      - make
      - procps
      - snapd
      - unzip
      - wget
      - zlib1g-dev
    stage-packages:
      # WireGuardNat (MASQUERADE/FORWARD) calls iptables + `ip route`; firewall-control plug required at runtime.
      - iptables
      - iproute2
      - libc6
      - libncurses6
      - libsigsegv2
      - libstdc++6
      - mawk
      - zlib1g
    override-pull: |
      craftctl default
      # git worktrees / shallow exports may not have a valid .git; fall back for snap version metadata.
      ver="$(git describe --tags --always 2>/dev/null || echo 0+unknown)"
      craftctl set version="$ver"
      craftctl set grade="stable"

apps:
  service:
    command: bin/run start
    plugs: [network, network-bind, network-control, firewall-control]
    daemon: simple

  shell:
    command: bin/run elevated remote
    plugs: [network, network-bind]

  flush:
    command: bin/run elevated rpc Diode.Cmd.flush_cache
    plugs: [network, network-bind]

  info:
    command: bin/run rpc Diode.Cmd.status
    plugs: [network, network-bind]

  env:
    command: bin/run elevated rpc Diode.Cmd.env
    plugs: [network, network-bind]

