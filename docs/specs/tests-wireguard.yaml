# WireGuard Exit Node Service - Test Cases
# See feature-wireguard-exit-node.md

wireguard_add_peer:
  - name: "add peer for new device"
    input:
      device: "0x1234567890123456789012345678901234567890"
      public_key: "YAnz5DF+rFpW0mNh3GlOa2Tqp2fnlJWBZAGb2f73fl+A="
    output: :ok
    expect_traffic_accounted: false  # no traffic yet

  - name: "add peer replaces existing"
    setup:
      device: "0x1234567890123456789012345678901234567890"
      public_key: "OLD_KEY_BASE64_PLACEHOLDER"
    input:
      device: "0x1234567890123456789012345678901234567890"
      public_key: "NEW_KEY_BASE64_PLACEHOLDER"
    output: :ok
    expect_traffic_accounted: true  # replacement accounts old peer traffic

wireguard_remove_peer:
  - name: "remove peer with existing peer"
    setup:
      device: "0xabcdefabcdefabcdefabcdefabcdefabcdefabcd"
      public_key: "KEY_FOR_REMOVAL"
    input:
      device: "0xabcdefabcdefabcdefabcdefabcdefabcdefabcd"
    output: :ok
    expect_traffic_accounted: true

  - name: "remove peer without peer (idempotent)"
    input:
      device: "0x9999999999999999999999999999999999999999"
    output: :ok
    expect_traffic_accounted: false

edge_wireguard_open:
  # Edge uses raw binary (32 bytes) for public_key in RLP. In tests, use Base16.decode(hex) to obtain binary.
  - name: "Edge wireguard open"
    method_params: ["wireguard", "open", "0x609b39cc0fed5a56d26361dc690e6b64eaa76fa7949560590066f67fb7ff97e0"]  # decode to binary
    authenticated: true
    output: ["response", "ok"]

  - name: "Edge wireguard close"
    method_params: ["wireguard", "close"]
    authenticated: true
    output: ["response", "ok"]

rpc_wireguard:
  # RPC uses DiodeClient.Base16 (hex) encoding for public_key
  - name: "dio_wireguard_open requires authentication"
    method: "dio_wireguard_open"
    params: ["0x609b39cc0fed5a56d26361dc690e6b64eaa76fa7949560590066f67fb7ff97e0"]
    authenticated: false
    error: true
    error_code: -32000
    error_message: "not authenticated"

  - name: "dio_wireguard_open with valid ticket"
    method: "dio_wireguard_open"
    params: ["0x609b39cc0fed5a56d26361dc690e6b64eaa76fa7949560590066f67fb7ff97e0"]
    authenticated: true
    output: null
